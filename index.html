<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ink:#1c1917;--paper:#faf8f5;--accent:#b45309;--warm:#78716c;--panel:#fefdfb;--tag-bg:#fef3c7;--tag-text:#92400e}
body{font-family:Georgia,'Times New Roman',serif;background:var(--ink);overflow:hidden;height:100vh}
.header{position:fixed;top:0;left:0;right:0;z-index:1000;background:var(--ink);color:var(--paper);padding:10px 16px;display:flex;align-items:center;gap:12px;border-bottom:3px solid var(--accent)}
.header h1{font-size:1.25rem;font-weight:700}
.header h1 span{color:var(--accent)}
.header-sub{font-family:system-ui,sans-serif;font-size:.65rem;color:var(--warm);letter-spacing:.12em;text-transform:uppercase}
.header-right{margin-left:auto;font-family:system-ui,sans-serif;font-size:.75rem;color:var(--warm)}
.header-right strong{color:var(--accent);font-size:1rem}
.search-bar{position:fixed;top:52px;left:0;right:0;z-index:900;background:rgba(250,248,245,.95);backdrop-filter:blur(6px);padding:8px 12px;display:flex;gap:6px;flex-wrap:wrap;border-bottom:1px solid #e7e5e4}
.search-input{padding:8px 12px;border-radius:8px;border:1px solid #d6d3d1;font-size:.85rem;width:180px;background:#fff;font-family:system-ui,sans-serif;outline:none}
.search-input:focus{border-color:var(--accent)}
.fbtn{padding:5px 11px;border-radius:16px;border:1px solid #d6d3d1;font-size:.7rem;font-weight:600;cursor:pointer;background:#fff;font-family:system-ui,sans-serif;white-space:nowrap;transition:all .15s}
.fbtn:hover{border-color:var(--accent);color:var(--accent)}
.fbtn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
#map{position:fixed;top:96px;left:0;right:0;bottom:0;z-index:1}
.marker-cluster-small,.marker-cluster-medium,.marker-cluster-large{background:rgba(180,83,9,.2)!important}
.marker-cluster-small div,.marker-cluster-medium div,.marker-cluster-large div{background:var(--accent)!important;color:#fff!important;font-family:system-ui,sans-serif;font-weight:700}
.pin{width:28px;height:28px;border-radius:50% 50% 50% 0;background:var(--accent);transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.3);border:2px solid #fff;cursor:pointer;transition:transform .15s}
.pin:hover{transform:rotate(-45deg) scale(1.2)}
.pin span{transform:rotate(45deg);color:#fff;font-weight:700;font-size:9px;font-family:system-ui,sans-serif}
.pin.hall{background:#991b1b}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:2000;opacity:0;pointer-events:none;transition:opacity .3s}
.overlay.open{opacity:1;pointer-events:all}
.panel{position:fixed;right:-440px;top:0;bottom:0;width:420px;max-width:95vw;background:var(--panel);z-index:2001;transition:right .35s cubic-bezier(.22,1,.36,1);overflow-y:auto;box-shadow:-4px 0 24px rgba(0,0,0,.2)}
.panel.open{right:0}
.panel-top{height:110px;background:linear-gradient(135deg,#fef3c7,#fde68a,#f59e0b);display:flex;align-items:center;justify-content:center;position:relative}
.panel-top-num{font-size:3rem;font-weight:700;color:rgba(255,255,255,.6)}
.panel-x{position:absolute;top:10px;right:10px;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.4);color:#fff;border:none;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.panel-x:hover{background:rgba(0,0,0,.7)}
.pbody{padding:20px 22px 32px;font-family:system-ui,sans-serif}
.ptags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.ptag{font-size:.6rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border-radius:12px;background:var(--tag-bg);color:var(--tag-text)}
.ptag.new{background:#dcfce7;color:#166534}
.pname{font-family:Georgia,serif;font-size:1.4rem;line-height:1.25;margin-bottom:4px}
.ptech{font-size:.82rem;color:var(--accent);font-weight:500;margin-bottom:14px}
.pdiv{width:36px;height:3px;background:var(--accent);margin-bottom:14px;border-radius:2px}
.prows{display:flex;flex-direction:column;gap:9px;margin-bottom:18px}
.prow{display:flex;gap:8px;font-size:.82rem;align-items:flex-start}
.prow-i{flex-shrink:0;width:18px;text-align:center}
.prow-l{color:var(--warm);font-weight:600;min-width:52px}
.prow-v{color:var(--ink);word-break:break-word}
.prow-v a{color:var(--accent);text-decoration:none}
.prow-v a:hover{text-decoration:underline}
.pbtns{display:flex;gap:8px;flex-wrap:wrap}
.pbtn{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border-radius:8px;font-size:.78rem;font-weight:600;text-decoration:none;border:none;cursor:pointer;font-family:system-ui,sans-serif}
.pbtn-a{background:var(--ink);color:var(--paper)}
.pbtn-a:hover{background:var(--accent)}
.pbtn-b{background:#f5f5f4;color:var(--ink);border:1px solid #e7e5e4}
.pbtn-b:hover{border-color:var(--accent);color:var(--accent)}
.side{position:fixed;left:0;top:96px;bottom:0;width:270px;background:var(--panel);z-index:800;overflow-y:auto;transform:translateX(-100%);transition:transform .3s;border-right:1px solid #e7e5e4;box-shadow:4px 0 16px rgba(0,0,0,.1)}
.side.open{transform:translateX(0)}
.side-head{padding:12px 14px;background:var(--ink);color:var(--paper);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:2}
.side-head h3{font-size:.95rem}
.side-x{background:none;border:none;color:var(--warm);font-size:1.1rem;cursor:pointer}
.si{padding:9px 14px;border-bottom:1px solid #f5f5f4;cursor:pointer;display:flex;gap:9px;align-items:center;font-family:system-ui,sans-serif;transition:background .1s}
.si:hover{background:#fef3c7}
.si-n{width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:700;flex-shrink:0}
.si-name{font-weight:600;font-size:.78rem;color:var(--ink)}
.si-sub{font-size:.65rem;color:var(--warm)}
.bbar{position:fixed;bottom:16px;left:12px;z-index:900;display:flex;gap:8px}
.bbtn{padding:10px 16px;border-radius:10px;background:var(--ink);color:var(--paper);border:none;font-size:.78rem;font-weight:600;cursor:pointer;box-shadow:0 3px 12px rgba(0,0,0,.25);font-family:system-ui,sans-serif;display:flex;align-items:center;gap:6px}
.bbtn:hover{background:var(--accent)}
@media(max-width:600px){.search-input{width:130px}.panel{width:100vw}.side{width:100vw}}
